<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f4f4f4;
  color:#111;
  overflow-x:hidden;
  font-weight:600; /* 🔧 MÁS LIGERO */
}

/* TITULOS (NO CAMBIADOS) */
header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:900;
}

.section{
  text-align:center;
  font-weight:900; /* 🔥 SE MANTIENE FUERTE */
  margin:15px 0 8px;
}

/* MENU */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:700;
  z-index:999;
  cursor:pointer;
}

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:270px;
  height:100%;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(15px);
  padding:15px;
  transition:0.3s;
  z-index:998;
}

.menu-item{
  display:block;
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.12);
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-weight:600;
}

/* CARDS */
.card{
  background:#fff;
  margin:10px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  font-weight:600;
}

.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:700;
  margin-top:10px;
  cursor:pointer;
}

/* BBVA */
.bbva-card{
  margin:10px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(135deg,#061a3a,#0a4db8,#1e88e5);
  color:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
  font-weight:600;
}

/* MELI+ */
.meli-card{
  margin:10px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(135deg,#0a4db8,#1e88e5);
  color:#fff;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  font-weight:600;
}

/* RELÁMPAGOS (AMARILLO ORIGINAL) */
.flash-title{
  font-size:18px;
  font-weight:900;
  text-align:center;
}

.flash-box{
  border:2px solid #ffcc00;
  background:#fffbe6; /* 🔥 AMARILLO ORIGINAL */
  margin:10px;
  padding:12px;
  border-radius:12px;
  font-weight:600;
}

/* STATUS */
.status{
  display:flex;
  align-items:center;
  gap:6px;
  font-weight:700;
  margin-bottom:6px;
}

.dot{width:10px;height:10px;border-radius:50%;}
.green{background:#00c853;}
.orange{background:#ff9800;}
.red{background:#e53935;}

/* COUNTDOWN */
.countdown{
  font-size:16px;
  font-weight:700;
  margin-top:8px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  font-weight:700;
  opacity:0;
  transition:0.3s;
  z-index:2000;
}
.toast.show{opacity:1}

/* WHATSAPP */
.wa{
  position:fixed;
  bottom:18px;
  right:18px;
  width:60px;
  height:60px;
  background:rgba(37,211,102,0.9);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  text-decoration:none;
  z-index:999;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<header>⚡ EL PATRÓN DE LAS OFERTAS ⚡</header>

<!-- BBVA -->
<div class="bbva-card">
  💳 <b>BBVA 25% OFF EXCLUSIVO</b><br>
  🛒 Mercado Libre<br>
  📌 Compra mínima: $7,000 MXN<br>
  💰 Tope de descuento: $2,000 MXN<br>

  <div id="countdown" class="countdown"></div>

  <button class="btn" onclick="copyCoupon('BBVAGOLAZO')">
    COPIAR CUPÓN Y ABRIR
  </button>
</div>

<!-- MELI+ -->
<div class="meli-card">
  🎟️ <b>MELI+ EXCLUSIVO</b><br>
  📌 Compra mínima: $4,000 MXN<br>
  💰 Descuento máximo: $500 MXN<br>

  <button class="btn" onclick="copyCoupon('MELIMASGOL')">
    COPIAR CUPÓN
  </button>
</div>

<!-- RELÁMPAGOS -->
<div class="section flash-title">⚡ CUPONES RELÁMPAGOS ⚡</div>
<div id="daily"></div>

<div id="toast" class="toast">COPIADO ✔</div>

<a class="wa" href="https://whatsapp.com/channel/0029Vb7W8ijKrWQpUEGkJe1x">💬</a>

<script>

function copyCoupon(code){
  navigator.clipboard.writeText(code);

  const t=document.getElementById("toast");
  t.textContent="CUPÓN COPIADO ✔";
  t.classList.add("show");

  setTimeout(()=>t.classList.remove("show"),1200);

  setTimeout(()=>{
    window.location.href="https://meli.la/1mj3itE";
  },700);
}

/* COUNTDOWN HH:MM:SS */
function updateCountdown(){
  const now=new Date();
  const start=new Date(); start.setHours(17,0,0);
  const end=new Date(); end.setHours(18,0,0);

  const el=document.getElementById("countdown");

  const fmt=(ms)=>{
    const h=Math.floor(ms/3600000);
    const m=Math.floor((ms%3600000)/60000);
    const s=Math.floor((ms%60000)/1000);
    return `${h}h ${m}m ${s}s`;
  };

  if(now<start) el.innerHTML="Empieza en "+fmt(start-now);
  else if(now<=end) el.innerHTML="🔥 ACTIVO - termina en "+fmt(end-now);
  else el.innerHTML="❌ FINALIZADO";
}
setInterval(updateCountdown,1000);
updateCountdown();

/* RELÁMPAGOS AMARILLOS + FORMATO $ */
const dailyCoupons=[
{code:"REBAJAS",min:2000,max:200},
{code:"12APROVECHA",min:1000,max:150},
{code:"VIERNES600",min:6000,max:600},
{code:"CUPON800",min:8000,max:800}
];

const daily=document.getElementById("daily");

dailyCoupons.forEach(c=>{
  const s=getStatus();
  daily.innerHTML+=`
  <div class="flash-box">
    <div class="status">
      <span class="dot ${s.color}"></span>
      ${s.text}
    </div>
    📌 Compra mínima: $${c.min.toLocaleString()}<br>
    💰 Descuento máximo: $${c.max.toLocaleString()}
    <button class="btn" onclick="copyCoupon('${c.code}')">COPIAR</button>
  </div>`;
});

function getStatus(){
  const h=new Date().getHours();
  if(h>=9 && h<13) return {text:"ACTIVO",color:"green"};
  if(h>=13 && h<24) return {text:"POR AGOTARSE",color:"orange"};
  return {text:"AGOTADO",color:"red"};
}

</script>

</body>
</html>
