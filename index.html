<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f4f4f4;
  color:#111;
  overflow-x:hidden;
}

header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:900;
}

.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
  z-index:999;
  cursor:pointer;
}

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:270px;
  height:100%;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(15px);
  padding:15px;
  transition:0.3s;
  z-index:998;
}

.menu-item{
  display:block;
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.12);
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}

.logo{
  display:flex;
  justify-content:center;
  margin:14px 0;
}

.logo img{
  width:160px;
  border-radius:14px;
  border:3px solid #ffcc00;
}

.section{
  text-align:center;
  font-weight:900;
  margin:15px 0 8px;
}

.card{
  background:#fff;
  margin:10px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:900;
  margin-top:10px;
  cursor:pointer;
}

/* BBVA */
.bbva-card{
  margin:10px;
  padding:18px;
  border-radius:18px;
  color:#fff;
  background:linear-gradient(135deg,#002a7a,#0053c7,#007bff);
}

.bbva-btn{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  font-weight:900;
  background:#fff;
  color:#0033a0;
  cursor:pointer;
  margin-top:12px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  font-weight:900;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1}

.wa{
  position:fixed;
  bottom:18px;
  right:18px;
  width:60px;
  height:60px;
  background:rgba(37,211,102,0.9);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="menu">
  <div class="section" style="color:#ffcc00;">📂 Categorías</div>
  <a class="menu-item" href="https://meli.la/1wmWhqC">📱 Celulares</a>
  <a class="menu-item" href="https://meli.la/1ZJDgik">🛏️ Colchones</a>
  <a class="menu-item" href="https://meli.la/2AGTYez">🔧 Herramienta</a>
  <a class="menu-item" href="https://meli.la/2Phn6fn">🚗 Vehículos</a>
</div>

<header>⚡ EL PATRÓN DE LAS OFERTAS ⚡</header>

<div class="logo">
  <img src="logo.png.PNG">
</div>

<!-- BBVA -->
<div class="section">🔥 PROMO EXCLUSIVA BBVA 🔥</div>

<div class="bbva-card">

  <div style="display:flex;justify-content:space-between;font-weight:900;font-size:22px;">
    <div>BBVA</div>
    <div>💳</div>
  </div>

  <div id="countdown" style="font-size:26px;font-weight:900;color:#ffeb3b;margin:10px 0;">Cargando...</div>

  <div style="font-size:14px;line-height:1.5;">
    25% BBVA<br>
    Min $7,000 | Max $2,000<br>
    5:00 - 6:00 PM
  </div>

  <button class="bbva-btn" onclick="copyCoupon('BBVAGOLAZO')">
    COPIAR CUPÓN
  </button>

</div>

<!-- VIP -->
<div class="section">⭐ VIP MELI+</div>
<div class="card">
  🎟️ MELI+
  <div>Min $4,000 | Max $500</div>
  <button class="btn" onclick="copyCoupon('MELIMASGOL')">COPIAR</button>
</div>

<!-- CUPONES -->
<div class="section">⚡ CUPONES</div>
<div id="cupones"></div>

<div id="toast" class="toast">COPIADO ✔</div>

<a class="wa" href="https://whatsapp.com/channel/0029Vb7W8ijKrWQpUEGkJe1x">💬</a>

<script>

/* MENU */
function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.left = (m.style.left==="0px") ? "-280px" : "0px";
}

/* COPIAR */
function copyCoupon(code){
  navigator.clipboard.writeText(code);
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1200);
  setTimeout(()=>window.location.href="https://meli.la/1mj3itE",600);
}

/* BBVA SIEMPRE ACTIVO */
setInterval(()=>{
  document.querySelector(".bbva-btn").innerText="COPIAR CUPÓN";
},1000);

/* COUNTDOWN */
function updateCountdown(){
  const now=new Date();
  const start=new Date(); start.setHours(17,0,0);
  const end=new Date(); end.setHours(18,0,0);

  const el=document.getElementById("countdown");

  if(now<start){
    el.innerHTML="Empieza pronto";
  } else if(now<=end){
    el.innerHTML="🔥 ACTIVO";
  } else {
    el.innerHTML="FINALIZADO";
  }
}
setInterval(updateCountdown,1000);
updateCountdown();

/* 🔥 SISTEMA PRO DE CUPONES (SOLO EDITAS AQUÍ) */
const CUPONES = `
REBAJAS|2000|200
VIERNES600|6000|600
CUPON800|8000|800
MILVIERNES|10000|1000
SANTGOL|4000|1000
HSBCGOL|3000|500
BNRTGOL|3000|500
AMEXGOL|4500|1000
AFRMGOL|2500|1000
MIFEGOL|2500|750
`;

/* PARSER */
function parseCoupons(text){
  return text.trim().split("\n").map(line=>{
    const [code,min,max] = line.split("|");
    return {code,min,max};
  });
}

/* RENDER */
function renderCoupons(){
  const box=document.getElementById("cupones");
  box.innerHTML="";

  parseCoupons(CUPONES).forEach(c=>{
    box.innerHTML += `
      <div class="card">
        <b>${c.code}</b><br>
        Min $${Number(c.min).toLocaleString()} | Max $${Number(c.max).toLocaleString()}
        <button class="btn" onclick="copyCoupon('${c.code}')">COPIAR</button>
      </div>
    `;
  });
}

renderCoupons();

</script>

</body>
</html>
