<title>El Patrón de las Ofertas</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  color:#111;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:900;
  font-size:18px;
  position:sticky;
  top:0;
  z-index:10;
}

/* MENU BOTÓN FLOTANTE */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  font-size:28px;
  background:#111;
  color:#fff;
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100%;
  background:#111;
  color:#fff;
  padding:15px;
  transition:0.3s;
  z-index:998;
  overflow-y:auto;
}

.sidebar h3{
  color:#ffcc00;
}

.sidebar a{
  display:block;
  color:#fff;
  padding:10px 0;
  text-decoration:none;
}

/* LOGO */
.logo{
  display:flex;
  justify-content:center;
  margin:12px 0;
}

.logo img{
  width:180px;
  border-radius:12px;
  border:3px solid #ffcc00;
}

/* CARRUSEL */
.carousel{
  width:100%;
  overflow:hidden;
}

.carousel-track{
  display:flex;
  animation:slide 20s infinite;
}

.carousel-track a{
  min-width:100%;
}

.carousel img{
  width:100%;
  display:block;
}

@keyframes slide{
  0%{transform:translateX(0)}
  16%{transform:translateX(-100%)}
  33%{transform:translateX(-200%)}
  50%{transform:translateX(-300%)}
  66%{transform:translateX(-400%)}
  83%{transform:translateX(-500%)}
  100%{transform:translateX(0)}
}

/* CONTADOR */
.counter{
  text-align:center;
  background:#111;
  color:#fff;
  padding:8px;
  font-weight:bold;
}

/* BUSCADOR */
.search{
  padding:10px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* CARDS */
.card{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* BOTÓN */
.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  font-weight:900;
  margin-top:8px;
}

/* WHATSAPP */
.wa{
  position:fixed;
  bottom:18px;
  right:18px;
  width:55px;
  height:55px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  text-decoration:none;
}
</style>
</head>
