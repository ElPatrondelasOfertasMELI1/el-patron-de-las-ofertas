<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patrón de las Ofertas</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f4f4;
  color:#111;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:900;
  font-size:18px;
  position:relative;
}

/* HAMBURGER */
.menu-btn{
  position:absolute;
  left:12px;
  top:12px;
  font-size:26px;
  cursor:pointer;
}

/* MENU LATERAL */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100%;
  background:#111;
  color:white;
  padding:15px;
  transition:0.3s;
  z-index:999;
}

.sidebar h3{
  color:#ffcc00;
}

.sidebar a{
  display:block;
  color:white;
  padding:10px 0;
  text-decoration:none;
}

/* LOGO */
.logo{
  display:flex;
  justify-content:center;
  margin:12px 0;
}

.logo img{
  width:180px;
  border-radius:12px;
  border:3px solid #ffcc00;
}

/* CARRUSEL */
.carousel{
  width:100%;
  overflow:hidden;
}

.carousel-track{
  display:flex;
  animation:slide 18s infinite;
}

.carousel-track a{
  min-width:100%;
}

.carousel img{
  width:100%;
  display:block;
}

@keyframes slide{
  0%{transform:translateX(0)}
  16%{transform:translateX(-100%)}
  33%{transform:translateX(-200%)}
  50%{transform:translateX(-300%)}
  66%{transform:translateX(-400%)}
  83%{transform:translateX(-500%)}
  100%{transform:translateX(0)}
}

/* CONTADOR */
.counter{
  text-align:center;
  background:#111;
  color:#fff;
  padding:8px;
  font-weight:bold;
}

/* BUSCADOR */
.search{
  padding:10px;
}
.search input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* CARD */
.card{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  font-weight:600;
}

/* BOTÓN */
.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  font-weight:900;
  cursor:pointer;
  margin-top:8px;
}

/* WHATSAPP */
.wa{
  position:fixed;
  bottom:18px;
  right:18px;
  width:55px;
  height:55px;
  background:#25D366;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  text-decoration:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="menu">
  <h3>☰ Menú</h3>
  <a href="#meli">⭐ Meli+</a>
  <a href="#flash">⚡ Relámpagos</a>
  <a href="#banks">🏦 Bancos</a>
</div>

<header>
<span class="menu-btn" onclick="toggleMenu()">☰</span>
⚡ EL PATRÓN DE LAS OFERTAS ⚡
</header>

<!-- CARRUSEL -->
<div class="carousel">
  <div class="carousel-track">

    <!-- 🔴 CAMBIA AQUÍ TUS 6 IMÁGENES REALES -->
    <a href="https://mercadolibre.com">
      <img src="1.jpg">
    </a>
    <a href="https://mercadolibre.com">
      <img src="2.jpg">
    </a>
    <a href="https://mercadolibre.com">
      <img src="3.jpg">
    </a>
    <a href="https://mercadolibre.com">
      <img src="4.jpg">
    </a>
    <a href="https://mercadolibre.com">
      <img src="5.jpg">
    </a>
    <a href="https://mercadolibre.com">
      <img src="6.jpg">
    </a>

  </div>
</div>

<!-- LOGO CORREGIDO -->
<div class="logo">
  <img src="logo.png.PNG" alt="logo">
</div>

<div class="counter" id="counter">👆 Clics: 0</div>

<div class="search">
  <input type="text" placeholder="Buscar cupones..." onkeyup="buscar(this.value)">
</div>

<!-- TODO TU SISTEMA ORIGINAL SIGUE IGUAL -->
<div id="flashBox"></div>
<div id="banks"></div>

<a class="wa" href="https://whatsapp.com/channel/0029Vb7W8ijKrWQpUEGkJe1x">💬</a>

<script>

const link = "https://meli.la/1mj3itE";

let clicks = localStorage.getItem("clicks") || 0;
document.getElementById("counter").innerText = "👆 Clics: " + clicks;

/* MENU */
function toggleMenu(){
  const m = document.getElementById("menu");
  m.style.left = (m.style.left === "0px") ? "-260px" : "0px";
}

/* BUSCADOR */
function buscar(val){
  document.querySelectorAll(".card").forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(val.toLowerCase())
    ? "block":"none";
  });
}

function go(code){
  navigator.clipboard.writeText(code);
  clicks++;
  localStorage.setItem("clicks",clicks);
  document.getElementById("counter").innerText = "👆 Clics: " + clicks;
  window.location.href = link;
}

/* RELÁMPAGOS */
const flash = [
{n:"SIEMPREFUT",m:"$2,000",d:"$215"},
{n:"DESCUENTO600",m:"$6,000",d:"$600"},
{n:"JUEVES10",m:"$500",d:"$100"}
];

flash.forEach(f=>{
  document.getElementById("flashBox").innerHTML += `
  <div class="card">
    ⚡ ${f.n}
    <div>📌 ${f.m} | 💰 ${f.d}</div>
    <button class="btn" onclick="go('${f.n}')">VER CUPÓN</button>
  </div>`;
});

/* BANCOS */
const bancos = [
["Mercado Pago","$4000","$500","TCMPGOL"],
["BBVA","$4500","$500","BBVAGOL"]
];

bancos.forEach(b=>{
  document.getElementById("banks").innerHTML += `
  <div class="card">
    🏦 ${b[0]}
    <div>📌 ${b[1]} | 💰 ${b[2]}</div>
    <button class="btn" onclick="go('${b[3]}')">VER CUPÓN</button>
  </div>`;
});

</script>

</body>
</html>
