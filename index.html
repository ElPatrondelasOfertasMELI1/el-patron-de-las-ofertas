<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Cupones Relámpago ML</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:bold;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.02)}
  100%{transform:scale(1)}
}

.card{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:6px;
}

.counter{
  text-align:center;
  background:#111;
  color:#fff;
  padding:8px;
  font-size:14px;
}

/* RELÁMPAGOS DESTACADOS */
.flash{
  border:2px solid #ffcc00;
  box-shadow:0 0 10px #ffcc00;
}

.small{
  font-size:13px;
  color:#333;
}
</style>
</head>

<body>

<header>⚡🔥 CUPONES RELÁMPAGO ML 🔥⚡</header>

<div class="counter" id="counter"></div>

<!-- 🔥 RELÁMPAGOS PRIMERO -->
<div id="flash"></div>

<!-- 🏦 BANCOS -->
<div id="banks"></div>

<script>

const link = "https://meli.la/1mj3itE";

/* CUPONES RELÁMPAGO (PRIMERO) */
const flash = [
{
name:"SIEMPREFUT",
min:"$2,000",
cap:"$215",
code:"SIEMPREFUT"
},
{
name:"DESCUENTO600",
min:"$6,000",
cap:"$600",
code:"DESCUENTO600"
},
{
name:"JUEVES10",
min:"$500",
cap:"$100",
code:"JUEVES10"
}
];

/* BANCOS */
const bancos = [
{n:"Mercado Pago",m:"$4000",c:"TCMPGOL"},
{n:"Meses sin tarjeta",m:"$2500",c:"MSTGOL"},
{n:"BBVA",m:"$4500",c:"BBVAGOL"},
{n:"HSBC",m:"$3000",c:"HSBCGOL"},
{n:"Banorte",m:"$3000",c:"BNRTGOL"},
{n:"Santander",m:"$2500",c:"SANTGOL"},
{n:"AMEX",m:"$4500",c:"AMEXGOL"},
{n:"Afirme",m:"$2500",c:"AFRMGOL"},
{n:"Mifel",m:"$2500",c:"MIFEGOL"}
];

const flashDiv = document.getElementById("flash");
const banksDiv = document.getElementById("banks");

/* RENDER RELÁMPAGOS */
flash.forEach(f=>{
  flashDiv.innerHTML += `
  <div class="card flash">
    ⚡ ${f.name}
    <div class="small">📌 ${f.min} | 💰 ${f.cap}</div>
    <button class="btn" onclick="go('${f.code}')">VER CUPÓN</button>
  </div>`;
});

/* RENDER BANCOS */
bancos.forEach(b=>{
  banksDiv.innerHTML += `
  <div class="card">
    🏦 ${b.n}
    <div class="small">📌 ${b.m}</div>
    <button class="btn" onclick="go('${b.c}')">VER CUPÓN</button>
  </div>`;
});

/* FUNCION VIRAL */
function go(code){

  // copiar cupón
  navigator.clipboard.writeText(code).catch(()=>{});

  // redirigir a meli
  setTimeout(()=>{
    window.location.href = link;
  },400);
}

/* contador */
document.getElementById("counter").innerHTML =
"🎟️ Cupones activos: " + (flash.length + bancos.length);

</script>

</body>
</html>
