<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f4f4f4;
  overflow-x:hidden;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:900;
}

/* BOTÓN MENÚ CRISTAL */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  width:50px;
  height:50px;
  border-radius:14px;
  background:rgba(255,255,255,0.3);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  z-index:999;
}

/* SIDEBAR CRISTAL (SIN RALLA NEGRA) */
.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:270px;
  height:100%;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(15px);
  color:#fff;
  padding:15px;
  transition:0.3s;
  z-index:998;
  overflow-y:auto;
}

/* BOTONES CRISTAL MENU */
.menu-item{
  display:block;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.12);
  color:#fff;
  text-decoration:none;
  font-weight:600;
}

/* LOGO */
.logo{
  display:flex;
  justify-content:center;
  margin:12px 0;
}

.logo img{
  width:170px;
  border-radius:12px;
  border:3px solid #ffcc00;
}

/* SECCIONES */
.section{
  text-align:center;
  font-weight:900;
  margin:15px 0 8px;
}

/* CARD ANIMADA */
.card{
  background:#fff;
  margin:10px;
  padding:14px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  animation:fadeIn .4s ease-in-out;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

/* BOTÓN */
.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:900;
  margin-top:10px;
}

/* ESTADOS */
.status{
  font-weight:900;
  margin-bottom:5px;
}

.green{color:#00c853;}
.orange{color:#ff9800;}
.red{color:#e53935;}

/* MELI */
.meli-info{
  font-size:13px;
  margin-top:5px;
  color:#444;
}

/* WHATSAPP */
.wa{
  position:fixed;
  bottom:18px;
  right:18px;
  width:55px;
  height:55px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="menu">

  <h3>📂 Categorías</h3>

  <a class="menu-item" href="#">📱 Celulares</a>
  <a class="menu-item" href="#">🛏️ Colchones</a>
  <a class="menu-item" href="#">🔧 Herramientas</a>
  <a class="menu-item" href="#">🚗 Vehículos</a>
  <a class="menu-item" href="#">🏠 Electrodomésticos</a>
  <a class="menu-item" href="#">🎮 Gaming</a>
  <a class="menu-item" href="#">🧸 Juguetes</a>
  <a class="menu-item" href="#">💻 Cómputo</a>
  <a class="menu-item" href="#">👕 Moda</a>
  <a class="menu-item" href="#">💄 Belleza</a>

</div>

<header>⚡ EL PATRÓN DE LAS OFERTAS ⚡</header>

<div class="logo">
  <img src="logo.png.PNG">
</div>

<!-- MELI+ -->
<div class="section">⭐ CUPÓN MELI+</div>
<div class="card">
  <b>Descuento especial activo</b>
  <div class="meli-info">
    Compra mínima: $4,000 | Descuento: $500
  </div>
  <button class="btn" onclick="go('MELIMASGOL')">COPIAR CUPÓN</button>
</div>

<!-- RELÁMPAGOS -->
<div class="section">⚡ CUPONES RELÁMPAGO</div>
<div id="flashBox"></div>

<!-- BANCOS -->
<div class="section">🏦 CUPONES BANCARIOS 👇</div>
<div id="banks"></div>

<a class="wa" href="https://whatsapp.com/channel/0029Vb7W8ijKrWQpUEGkJe1x">💬</a>

<script>

let clicks=0;

function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.left = (m.style.left==="0px") ? "-280px" : "0px";
}

function getStatus(){
  const h=new Date().getHours();
  if(h < 4) return "green";
  if(h < 8) return "orange";
  return "red";
}

function go(code){
  navigator.clipboard.writeText(code);

  alert("CUPÓN COPIADO ✔");

  window.location.href="https://meli.la/1mj3itE";
}

/* RELÁMPAGOS OCULTOS */
const flash=[
{n:"SIEMPREFUT",m:"$2,000",d:"$215"},
{n:"DESCUENTO600",m:"$6,000",d:"$600"},
{n:"JUEVES10",m:"$500",d:"$100"}
];

flash.forEach(f=>{
  document.getElementById("flashBox").innerHTML+=`
  <div class="card">
    <div class="status ${getStatus()}">● ESTADO</div>
    ⚡ ${f.n}
    <div>📌 ${f.m} | 💰 ${f.d}</div>
    <button class="btn" onclick="go('${f.n}')">COPIAR CUPÓN</button>
  </div>`;
});

/* BANCOS */
const bancos=[
["Mercado Pago","4,000","500","TCMPGOL"],
["BBVA","4,500","500","BBVAGOL"],
["HSBC","3,000","500","HSBCGOL"]
];

bancos.forEach(b=>{
  document.getElementById("banks").innerHTML+=`
  <div class="card">
    🏦 ${b[0]}
    <div>📌 ${b[1]} | 💰 ${b[2]}</div>
    <button class="btn" onclick="go('${b[3]}')">COPIAR CUPÓN</button>
  </div>`;
});

</script>

</body>
</html>
