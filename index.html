<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>El Patrón De Las Ofertas</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:100px;
}

header{
background:#FFE600;
padding:20px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.logo{
width:220px;
max-width:90%;
border-radius:20px;
}

.titulo{
font-size:30px;
font-weight:bold;
margin-top:10px;
color:#333;
}

.sub{
color:#555;
margin-top:5px;
}

.banner{
background:#3483FA;
color:white;
margin:15px;
padding:15px;
border-radius:15px;
font-weight:bold;
text-align:center;
}

.contador{
margin:15px;
background:white;
padding:15px;
border-radius:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.cupon{
background:white;
margin:15px;
padding:20px;
border-radius:18px;
box-shadow:0 3px 15px rgba(0,0,0,.1);
}

.cupon h3{
margin-bottom:10px;
}

.oculto{
font-size:24px;
letter-spacing:3px;
font-weight:bold;
margin:15px 0;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#3483FA;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
font-size:26px;
text-decoration:none;
}

footer{
text-align:center;
margin-top:30px;
padding:20px;
color:#666;
}

</style>
</head>

<body>

<header>

<img src="logo.jpg" class="logo">

<div class="titulo">
👑 El Patrón De Las Ofertas
</div>

<div class="sub">
Aquí manda el ahorro
</div>

</header>

<div class="banner">
🔥 CUPONES RELÁMPAGO ACTIVOS 🔥
</div>

<div class="contador">
🎟️ Cupones activos: 3
</div>

<div class="cupon">

<h3>🔥 Cupón General</h3>

<p>$200 OFF</p>

<div class="oculto" id="c1">
************
</div>

<button class="btn"
onclick="activarCupon('VERANOREBAJAS','https://meli.la/2rSJqhZ','c1')">

🚀 Copiar y Activar

</button>

</div>

<div class="cupon">

<h3>🏦 Cupón Bancario</h3>

<p>$700 OFF</p>

<div class="oculto" id="c2">
************
</div>

<button class="btn"
onclick="activarCupon('QUEGANEMEX','https://meli.la/12Wui4z','c2')">

🚀 Copiar y Activar

</button>

</div>

<a class="whatsapp"
href="https://whatsapp.com/channel/0029Vb7W8ijKrWQpUEGkJe1x">

💬

</a>

<footer>

© El Patrón De Las Ofertas

</footer>

<script>

function activarCupon(codigo,link,id){

navigator.clipboard.writeText(codigo);

document.getElementById(id).innerHTML=codigo;

setTimeout(function(){

window.location.href=link;

},500);

}

</script>

</body>
</html>
