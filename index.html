<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f4f4f4;
  color:#111;
  overflow-x:hidden;
}

/* HEADER */
header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:900;
}

/* MENU */
.menu-btn{
  position:fixed;
  top:15px;
  left:15px;
  width:48px;
  height:48px;
  border-radius:14px;
  background:rgba(255,255,255,0.4);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  font-weight:900;
  z-index:999;
  cursor:pointer;
}

.sidebar{
  position:fixed;
  top:0;
  left:-280px;
  width:270px;
  height:100%;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(15px);
  padding:15px;
  transition:0.3s;
  z-index:998;
}

.menu-item{
  display:block;
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.12);
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-weight:700;
}

/* LOGO */
.logo{
  display:flex;
  justify-content:center;
  margin:14px 0;
}

.logo img{
  width:160px;
  border-radius:14px;
  border:3px solid #ffcc00;
}

/* SECCIONES */
.section{
  text-align:center;
  font-weight:900;
  margin:15px 0 8px;
}

/* CARD */
.card{
  background:#fff;
  margin:10px;
  padding:14px;
  border-radius:14px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* BOTÓN */
.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:10px;
  background:#00c853;
  color:#fff;
  font-weight:900;
  margin-top:10px;
}

/* CUADRO AMARILLO RELÁMPAGO */
.flash-box{
  margin:10px;
  padding:5px;
  border:2px solid #ffcc00;
  border-radius:12px;
  background:#fffbe6;
}

/* ESTADOS */
.status{
  font-weight:900;
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:6px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
}

.green{background:#00c853;}
.orange{background:#ff9800;}
.red{background:#e53935;}

/* DINERO PRO */
.money{
  font-size:18px;
  font-weight:900;
  letter-spacing:0.5px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 16px;
  border-radius:10px;
  font-weight:900;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1}

/* WHATSAPP */
.wa{
  position:fixed;
  bottom:18px;
  right:18px;
  width:55px;
  height:55px;
  background:#25D366;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}
</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="menu">

  <div class="section" style="color:#ffcc00;">📂 Categorías</div>

  <a class="menu-item" href="https://meli.la/1wmWhqC">📱 Celulares</a>
  <a class="menu-item" href="https://meli.la/1ZJDgik">🛏️ Colchones</a>
  <a class="menu-item" href="https://meli.la/2AGTYez">🔧 Herramienta</a>
  <a class="menu-item" href="https://meli.la/2Phn6fn">🚗 Vehículos</a>
  <a class="menu-item" href="https://meli.la/1MLzcHN">🏠 Electrodoméstico</a>
  <a class="menu-item" href="https://meli.la/2QLzQzB">🎮 Gaming</a>
  <a class="menu-item" href="https://meli.la/2wvqGN7">🧸 Juguetes</a>
  <a class="menu-item" href="https://meli.la/22qVGcg">💻 Cómputo</a>
  <a class="menu-item" href="https://meli.la/31NnLmv">👕 Moda</a>
  <a class="menu-item" href="https://meli.la/21wQwRZ">💄 Belleza</a>
  <a class="menu-item" href="https://meli.la/1dF2gmK">🔥 Ofertas imperdibles</a>

</div>

<header>⚡ EL PATRÓN DE LAS OFERTAS ⚡</header>

<div class="logo">
  <img src="logo.png.PNG">
</div>

<!-- MELI VIP -->
<div class="section">⭐ VIP MELI+</div>
<div class="card">
  <b>Acceso prioritario</b>
  <div class="money">💰 $4,000 | 🎟️ $500 OFF</div>
  <button class="btn" onclick="go('MELIMASGOL')">APLICAR CUPÓN</button>
</div>

<!-- RELÁMPAGOS -->
<div class="section">⚡ CUPONES RELÁMPAGO</div>
<div class="flash-box" id="flashBox"></div>

<!-- BANCARIOS -->
<div class="section">🏦 CUPONES BANCARIOS 🟢 ACTIVO</div>
<div id="banks"></div>

<div id="toast" class="toast">APLICAR CUPÓN</div>

<a class="wa" href="https://whatsapp.com/channel/0029Vb7W8ijKrWQpUEGkJe1x"></a>

<script>

function toggleMenu(){
  const m=document.getElementById("menu");
  m.style.left = (m.style.left==="0px") ? "-280px" : "0px";
}

/* TOAST */
function showToast(){
  const t=document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1200);
}

/* COPIAR */
function go(code){
  navigator.clipboard.writeText(code);
  showToast();
  window.location.href="https://meli.la/1mj3itE";
}

/* ESTADO RELÁMPAGOS */
function getStatus(){
  const h=new Date().getHours();
  if(h<4) return "green";
  if(h<8) return "orange";
  return "red";
}

/* RELÁMPAGOS */
const flash=[
{n:"SIEMPREFUT",m:2000,d:215},
{n:"DESCUENTO600",m:6000,d:600},
{n:"JUEVES10",m:500,d:100}
];

flash.forEach((f,i)=>{
  document.getElementById("flashBox").innerHTML+=`
  <div class="card flash-box">
    <div class="status"><span class="dot ${getStatus()}"></span> ${getStatus().toUpperCase()}</div>
    ⚡ Cupón relámpago #${i+1}
    <div class="money">📌 $${f.m.toLocaleString()} | 💰 $${f.d.toLocaleString()}</div>
    <button class="btn" onclick="go('${f.n}')">APLICAR CUPÓN</button>
  </div>`;
});

/* BANCARIOS (SIEMPRE ACTIVOS) */
const bancos=[
["Mercado Pago",4000,500,"TCMPGOL"],
["Meses sin tarjeta",2500,500,"MSTGOL"],
["BBVA",4500,500,"BBVAGOL"],
["HSBC",3000,500,"HSBCGOL"],
["Banorte",3000,500,"BNRTGOL"],
["Santander",2500,500,"SANTGOL"],
["AMEX",4500,500,"AMEXGOL"],
["Afirme",2500,1000,"AFRMGOL"],
["Mifel",2500,750,"MIFEGOL"],
["Meli+",4000,500,"MELIMASGOL"]
];

bancos.forEach(b=>{
  document.getElementById("banks").innerHTML+=`
  <div class="card">
    🏦 <b>${b[0]}</b>
    <div class="money">📌 $${b[1].toLocaleString()} | 💰 $${b[2].toLocaleString()}</div>
    <button class="btn" onclick="go('${b[3]}')">APLICAR CUPÓN</button>
  </div>`;
});

</script>

</body>
</html>
