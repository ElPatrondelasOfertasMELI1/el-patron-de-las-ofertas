<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patrón de las Ofertas PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:linear-gradient(90deg,#ffe600,#ffcc00);
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.logo{
  display:flex;
  justify-content:center;
  margin:10px;
}
.logo img{
  width:90px;
  height:90px;
  border-radius:50%;
}

.card{
  background:#fff;
  margin:10px;
  padding:12px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.btn{
  width:100%;
  padding:12px;
  border:0;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:6px;
}

.counter{
  text-align:center;
  background:#111;
  color:#fff;
  padding:8px;
  font-size:14px;
}

/* RELÁMPAGOS OCULTOS */
.hidden{
  display:none;
}

.toggleBtn{
  background:#2962ff;
  width:100%;
  padding:10px;
  border:0;
  color:#fff;
  border-radius:8px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>👑 EL PATRÓN DE LAS OFERTAS PRO</header>

<div class="logo">
  <img src="https://i.imgur.com/yourlogo.png">
</div>

<div class="counter" id="counter"></div>

<!-- MELI+ -->
<div class="card">
⭐ Meli+ Exclusivo (10%)
📌 Compra mínima: $4000  
💰 Tope: $500  
<button class="btn" onclick="go()">VER CUPÓN</button>
</div>

<!-- CUPONES BANCARIOS -->
<div id="banks"></div>

<!-- RELÁMPAGOS OCULTOS -->
<div class="card">
⚡ Cupones Relámpago
<button class="toggleBtn" onclick="toggle()">Mostrar relámpagos</button>

<div id="flash" class="hidden">

<br>
🎟️ SIEMPREFUT  
📌 $2,000 mínimo | 💰 $215 off  
<button class="btn" onclick="go()">VER CUPÓN</button>

<br><br>

🎟️ DESCUENTO600  
📌 $6,000 mínimo | 💰 $600 off  
<button class="btn" onclick="go()">VER CUPÓN</button>

<br><br>

🎟️ JUEVES10  
📌 $500 mínimo | 💰 $100 off  
<button class="btn" onclick="go()">VER CUPÓN</button>

</div>
</div>

<script>

const link = "https://meli.la/1mj3itE";

const bancos = [
{
name:"Mercado Pago",min:"$4000",cap:"$500"
},
{
name:"Meses sin tarjeta",min:"$2500",cap:"$500"
},
{
name:"BBVA",min:"$4500",cap:"$500"
},
{
name:"HSBC",min:"$3000",cap:"$500"
},
{
name:"Banorte",min:"$3000",cap:"$500"
},
{
name:"Santander",min:"$2500",cap:"$500"
},
{
name:"AMEX",min:"$4500",cap:"$500"
},
{
name:"Afirme",min:"$2500",cap:"$1000"
},
{
name:"Mifel",min:"$2500",cap:"$750"
}
];

const banks = document.getElementById("banks");

bancos.forEach(b=>{
  banks.innerHTML += `
  <div class="card">
    🏦 ${b.name} (10% OFF)
    <br>📌 Compra mínima: ${b.min}
    <br>💰 Tope: ${b.cap}
    <button class="btn" onclick="go()">VER CUPÓN</button>
  </div>`;
});

function go(){
  window.location.href = link;
}

/* RELÁMPAGOS */
function toggle(){
  const f = document.getElementById("flash");
  f.style.display = (f.style.display === "block") ? "none" : "block";
}

/* CONTADOR */
document.getElementById("counter").innerHTML =
"🎟️ Cupones activos: " + (bancos.length + 4);

</script>

</body>
</html>
