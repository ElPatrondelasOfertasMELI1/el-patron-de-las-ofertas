<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Patrón de las Ofertas ML</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:#111;
  padding:12px;
  text-align:center;
  font-weight:bold;
  z-index:10;
}

/* CARRUSEL */
.carousel{
  width:100%;
  overflow:hidden;
}
.carousel-track{
  display:flex;
  animation:slide 18s infinite;
}
.carousel img{
  width:100%;
  flex-shrink:0;
}
@keyframes slide{
  0%{transform:translateX(0)}
  16%{transform:translateX(-100%)}
  33%{transform:translateX(-200%)}
  50%{transform:translateX(-300%)}
  66%{transform:translateX(-400%)}
  83%{transform:translateX(-500%)}
  100%{transform:translateX(0)}
}

/* BUSCADOR */
.search{
  padding:10px;
}
.search input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
}

/* CUPONES */
.coupon{
  background:#1a1a1a;
  margin:10px;
  padding:15px;
  border-radius:12px;
}
.hidden-code{
  display:none;
  margin-top:10px;
  color:#00ff88;
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ffcc00;
  font-weight:bold;
}
</style>
</head>

<body>

<header>🔥 El Patrón de las Ofertas ML</header>

<!-- CARRUSEL -->
<div class="carousel">
  <div class="carousel-track">
    <a href="https://mercadolibre.com" target="_blank"><img src="img1.jpg"></a>
    <a href="https://mercadolibre.com" target="_blank"><img src="img2.jpg"></a>
    <a href="https://mercadolibre.com" target="_blank"><img src="img3.jpg"></a>
    <a href="https://mercadolibre.com" target="_blank"><img src="img4.jpg"></a>
    <a href="https://mercadolibre.com" target="_blank"><img src="img5.jpg"></a>
    <a href="https://mercadolibre.com" target="_blank"><img src="img6.jpg"></a>
  </div>
</div>

<!-- BUSCADOR -->
<div class="search">
  <input type="text" placeholder="Buscar cupones..." onkeyup="buscar(this.value)">
</div>

<!-- CUPÓN EJEMPLO -->
<div class="coupon">
  <h3>🎟️ Mercado Pago 10% OFF</h3>
  <p>Compra mínima: $4,000</p>

  <button onclick="mostrar(this)">VER CUPÓN</button>

  <div class="hidden-code">
    TCMPGOL
  </div>
</div>

<div class="coupon">
  <h3>🎟️ BBVA 10% OFF</h3>
  <p>Compra mínima: $450</p>

  <button onclick="mostrar(this)">VER CUPÓN</button>

  <div class="hidden-code">
    BBVAGOL
  </div>
</div>

<!-- WHATSAPP -->
<a href="https://whatsapp.com/channel/0029Vb7W8ijKrWQpUEGkJe1x" 
style="position:fixed;bottom:15px;right:15px;background:#25D366;padding:12px;border-radius:50%;text-decoration:none;">
💬
</a>

<script>
function mostrar(btn){
  const code = btn.nextElementSibling;
  code.style.display = code.style.display === "block" ? "none" : "block";
}

function buscar(val){
  document.querySelectorAll(".coupon").forEach(c=>{
    c.style.display = c.innerText.toLowerCase().includes(val.toLowerCase())
    ? "block":"none";
  });
}
</script>

</body>
</html>
