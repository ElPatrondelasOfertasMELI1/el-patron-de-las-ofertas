<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Admin - El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter,sans-serif;
background:#f2f3f5;
color:#000;
}

header{
background:#ffe600;
padding:20px;
text-align:center;
font-size:22px;
font-weight:900;
}

.login{
padding:30px;
text-align:center;
}

input{
padding:15px;
border-radius:12px;
border:0;
width:80%;
font-size:16px;
}

button{
margin-top:15px;
padding:14px;
border:0;
border-radius:12px;
background:#00c853;
color:white;
font-weight:900;
width:85%;
}

#panel{
display:none;
}


.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:15px;

}


.card{

background:white;
padding:20px;
border-radius:18px;
box-shadow:0 5px 15px #ddd;
text-align:center;

}


.numero{

font-size:30px;
font-weight:900;

}


.grafica{

margin:15px;
background:white;
padding:20px;
border-radius:18px;

}


.barra{

height:25px;
background:#00c853;
margin:8px 0;
border-radius:10px;

}

.barra-dia{

margin:12px 0;

}

.barra-dia span{

display:block;
font-weight:900;
margin-bottom:5px;

}


.fondo-barra{

background:#eee;
height:25px;
border-radius:12px;
overflow:hidden;

}


.relleno-barra{

height:100%;
background:#00c853;
border-radius:12px;
text-align:right;
padding-right:8px;
color:white;
font-size:13px;
font-weight:900;

}

</style>

</head>


<body>


<header>
⚡ PANEL ADMINISTRADOR ⚡
<br>
EL PATRÓN DE LAS OFERTAS
</header>



<div class="login" id="login">

<h2>🔐 Acceso</h2>

<input id="pass" type="password" placeholder="Contraseña">

<br>

<button onclick="entrar()">
ENTRAR
</button>

</div>



<div id="panel">


<div class="grid">

<div class="card">
👥 TOTAL VISITANTES
<div class="numero" id="visitantes">
0
</div>
</div>

<button onclick="reiniciarContadores()"
style="
background:#e53935;
color:#fff;
font-weight:900;
margin:15px;
width:calc(100% - 30px);
padding:16px;
border:none;
border-radius:15px;
font-size:17px;
cursor:pointer;
">
🔄 REINICIAR CONTADORES
</button>

<div class="card">
👆 TOTAL CLICS
<div class="numero" id="total">
0
</div>
</div>


<div class="card">
⚡ RELÁMPAGO
<div class="numero" id="relampago">
0
</div>
</div>


<div class="card">
💎 EXCLUSIVOS
<div class="numero" id="exclusivos">
0
</div>
</div>


<div class="card">
🏦 BANCARIOS
<div class="numero" id="bancarios">
0
</div>
</div>


</div>



<div class="grafica">

<h3>
📈 ACTIVIDAD
</h3>


<div>
Hoy
</div>

<div class="barra" id="barra"></div>


</div>

<div class="grafica">

<h3>
📊 ÚLTIMOS 3 DÍAS
</h3>

<div id="historial">
Cargando...
</div>

</div>

<div class="grafica">

<h3>
📈 VISITAS ÚLTIMOS 3 DÍAS
</h3>

<div id="graficaDias">
Cargando...
</div>

</div>

<div class="grafica">

<h3>
🌎 REGIONES
</h3>

<div id="regiones">
Cargando...
</div>

</div>

<div class="grafica">

<h3>
🎟️ CUPONES MÁS COPIADOS
</h3>

<div id="cupones">
Cargando...
</div>

</div>

<script type="module">


import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {
getFirestore,
doc,
onSnapshot,
collection,
getDocs,
getDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";




const firebaseConfig = {

apiKey: "AIzaSyBo_wk-k8TrcSl0CMQz0hoUCvAKre94hW0",

authDomain: "patronofertasweb.firebaseapp.com",

projectId: "patronofertasweb",

storageBucket: "patronofertasweb.firebasestorage.app",

messagingSenderId: "292338334268",

appId: "1:292338334268:web:9dbbafe00dd23ebb72e139"

};



const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

// ===== REGIONES EN TIEMPO REAL =====

const regionesRef = collection(db,"regiones");


onSnapshot(regionesRef,(snap)=>{

let html="";


snap.forEach(doc=>{

const data = doc.data();


html += `
<div class="card">
🌎 ${doc.id}
<br>
<b>${data.visitas || 0} visitas</b>
</div>
`;

});


if(html===""){
html="Sin datos todavía";
}


document.getElementById("regiones").innerHTML = html;


});


window.entrar = function(){

    window.reiniciarContadores = async function(){

        const clave = prompt("Escribe la contraseña para reiniciar:");

        if(clave !== "Admin2026"){
            alert("Contraseña incorrecta");
            return;
        }

        if(!confirm("¿Seguro que deseas reiniciar todos los contadores?")) return;

        const ref = doc(db,"contadores","global");

        await updateDoc(ref,{
            total:0,
            relampago:0,
            bancarios:0,
            exclusivos:0
        });

const cuponesRef = collection(db,"cupones");

const snap = await getDocs(cuponesRef);

for (const d of snap.docs){

    await updateDoc(doc(db,"cupones",d.id),{

        copias:0

    });

}

        alert("✅ Contadores reiniciados correctamente.");

    }

    let clave = document.getElementById("pass").value;

    if(clave==="Admin2026"){

        document.getElementById("login").style.display="none";
        document.getElementById("panel").style.display="block";
        
        cargarDatos();
cargarHistorial();
cargarRankingCupones();

  }else{

    alert("Contraseña incorrecta");

}

};

// ===== HISTORIAL ÚLTIMOS 3 DÍAS =====

async function cargarHistorial(){

const ref = collection(db,"visitas_historial");

onSnapshot(ref,(snap)=>{

let datos=[];

snap.forEach(doc=>{
    datos.push({
        fecha:doc.id,
        total:doc.data().total || 0
    });
});

datos.sort((a,b)=>b.fecha.localeCompare(a.fecha));

let html="";
let grafica="";

let max=Math.max(...datos.map(x=>x.total),1);

datos.slice(0,3).forEach(d=>{

html+=`
<p>
📅 ${d.fecha}<br>
👥 <b>${d.total} visitantes</b>
</p>
`;

let porcentaje=(d.total/max)*100;

grafica+=`
<div class="barra-dia">
<span>${d.fecha} (${d.total})</span>
<div class="fondo-barra">
<div class="relleno-barra" style="width:${porcentaje}%"></div>
</div>
</div>
`;

});

document.getElementById("historial").innerHTML=html;
document.getElementById("graficaDias").innerHTML=grafica;

});

// TOTAL DE VISITANTES

const visitantesRef = doc(db,"visitas","contador");

onSnapshot(visitantesRef,(snap)=>{

const data = snap.data();

document.getElementById("visitantes").innerHTML =
data.total || 0;

});

}

async function cargarRankingCupones(){

const ref = collection(db,"cupones");

onSnapshot(ref,(snap)=>{

let datos=[];

snap.forEach(doc=>{

datos.push({
nombre:doc.id,
copias:doc.data().copias || 0
});

});

datos.sort((a,b)=>b.copias-a.copias);

let html="";

datos.forEach((c,i)=>{

const puesto=["🥇","🥈","🥉","4️⃣","5️⃣","6️⃣"][i] || "⭐";

html+=`
<div class="card">
${puesto} <b>${c.nombre}</b><br>
${c.copias} copias
</div>
`;

});

document.getElementById("cupones").innerHTML = html;

});

}

function cargarDatos(){

const ref=doc(db,"contadores","global");



onSnapshot(ref,(snap)=>{


const data=snap.data();



document.getElementById("total").innerHTML=data.total || 0;


document.getElementById("relampago").innerHTML=data.relampago || 0;


document.getElementById("exclusivos").innerHTML=data.exclusivos || 0;


document.getElementById("bancarios").innerHTML=data.bancarios || 0;



let total=data.total || 1;


document.getElementById("barra").style.width=

Math.min(total/100,100)+"%";


});


}



</script>


</body>
</html>
