<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Admin PRO - El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
margin:0;
background:#f2f3f5;
color:#111;
}


header{
height:65px;
background:#ffe600;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:900;
position:sticky;
top:0;
z-index:10;
}


.login{
max-width:350px;
margin:50px auto;
padding:20px;
}


input,select{
width:100%;
padding:12px;
border:0;
border-radius:12px;
margin:6px 0;
font-size:14px;
}


button{
border:0;
padding:12px;
border-radius:12px;
font-weight:900;
cursor:pointer;
}


.btn{
width:100%;
background:#00c853;
color:white;
}


#panel{
display:none;
}


.sidebar{

position:fixed;
top:65px;
left:0;
bottom:0;
width:210px;
background:white;
padding:10px;

}


.menu{

width:100%;
margin-bottom:8px;
background:#f5f5f5;
text-align:left;

}


.content{

margin-left:230px;
padding:15px;

}


.section{
display:none;
}


.active{
display:block;
}


.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;

}


.card{

background:white;
padding:15px;
border-radius:18px;
box-shadow:0 5px 15px #ddd;

}


.numero{

font-size:32px;
font-weight:900;
color:#00a650;

}


@media(max-width:700px){

.sidebar{

width:70px;

}


.menu{

font-size:10px;

}


.content{

margin-left:80px;

}

}


</style>

</head>


<body>


<header>

⚡ ADMIN PRO ⚡
<br>
EL PATRÓN DE LAS OFERTAS

</header>


<div class="login" id="login">


<h2>
🔐 Administrador
</h2>


<input 
id="password"
type="password"
placeholder="Contraseña">


<button class="btn" onclick="login()">

ENTRAR

</button>


</div>




<div id="panel">


<div class="sidebar">


<button class="menu"
onclick="abrir('dashboard')">

📊 Dashboard

</button>


<button class="menu"
onclick="abrir('ofertas')">

⚡ Ofertas

</button>


<button class="menu"
onclick="abrir('cupones')">

🎟 Cupones

</button>


<button class="menu"
onclick="abrir('estadisticas')">

📈 Stats

</button>


</div>




<div class="content">



<div id="dashboard" class="section active">


<h2>
📊 Dashboard
</h2>


<div class="grid">


<div class="card">

👥 Visitantes

<div class="numero" id="visitas">

0

</div>

</div>


<div class="card">

👆 Copias

<div class="numero" id="copias">

0

</div>

</div>


<div class="card">

⚡ Relámpago

<div class="numero" id="relampago">

0

</div>

</div>


<div class="card">

💎 Meli+

<div class="numero" id="meli">

0

</div>

</div>


</div>


<br>


<div class="card">

💰 Ahorro comunidad

<h2 id="ahorro">

$0

</h2>

</div>


</div>




<div id="ofertas" class="section">

<h2>
⚡ Ofertas
</h2>

<div id="zonaOfertas"></div>

</div>



<div id="cupones" class="section">

<h2>
🎟 Cupones
</h2>

<div id="zonaCupones"></div>

</div>



<div id="estadisticas" class="section">

<h2>
📈 Estadísticas
</h2>

<div id="zonaStats"></div>

</div>



</div>

</div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {

getFirestore,
doc,
getDoc,
setDoc,
onSnapshot,
increment,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";





const firebaseConfig={


apiKey:"AIzaSyBo_wk-k8TrcSl0CMQz0hoUCvAKre94hW0",

authDomain:"patronofertasweb.firebaseapp.com",

projectId:"patronofertasweb",

storageBucket:"patronofertasweb.firebasestorage.app",

messagingSenderId:"292338334268",

appId:"1:292338334268:web:9dbbafe00dd23ebb72e139"


};



const app=initializeApp(firebaseConfig);


const db=getFirestore(app);





window.login=function(){


let pass=document.getElementById("password").value;


if(pass==="Admin2026"){


document.getElementById("login").style.display="none";

document.getElementById("panel").style.display="block";


cargarDashboard();


}

else{

alert("❌ Contraseña incorrecta");

}


};






window.abrir=function(id){


document.querySelectorAll(".section")
.forEach(x=>x.classList.remove("active"));


document.getElementById(id)
.classList.add("active");


};






function cargarDashboard(){



const global=doc(db,"contadores","global");


onSnapshot(global,(snap)=>{


let d=snap.data()||{};


document.getElementById("copias").innerHTML=
d.total||0;


document.getElementById("relampago").innerHTML=
d.relampago||0;


document.getElementById("meli").innerHTML=
d.exclusivos||0;


});





const ahorro=doc(db,"estadisticas","ahorro");


onSnapshot(ahorro,(snap)=>{


let d=snap.data()||{};


document.getElementById("ahorro").innerHTML=

"$"+Number(d.total||0).toLocaleString("es-MX");


});





let fecha=new Intl.DateTimeFormat(
"en-CA",
{
timeZone:"America/Mexico_City"
}
).format(new Date());



onSnapshot(
doc(db,"visitas",fecha),
(snap)=>{


let d=snap.data()||{};


document.getElementById("visitas").innerHTML=
d.visitas||0;


});


}



console.log("ADMIN PRO CONECTADO");


// ==============================
// OFERTAS RELÁMPAGO PRO
// ==============================


import {

collection,
addDoc,
deleteDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";




// INTERFAZ

document.getElementById("zonaOfertas").innerHTML=`

<div class="card">


<h3>
➕ Nueva Oferta
</h3>


<input id="tituloOferta"
placeholder="Nombre producto">


<input id="precioAntes"
placeholder="Precio anterior">


<input id="precioActual"
placeholder="Precio oferta">


<input id="linkOferta"
placeholder="Link Mercado Libre">


<input 
type="file"
id="imagenOferta"
accept="image/*">


<select id="estadoOferta">

<option value="activo">
🟢 Activa
</option>

<option value="agotado">
🔴 Agotada
</option>

</select>


<button class="btn"
onclick="guardarOferta()">

⚡ PUBLICAR

</button>


</div>


<br>


<div id="listaOfertas"></div>


`;




// CONVERTIR IMAGEN

function convertirImagen(file){

return new Promise(resolve=>{


let reader=new FileReader();


reader.onload=()=>{

resolve(reader.result);

};


reader.readAsDataURL(file);


});

}





// GUARDAR OFERTA

window.guardarOferta=async function(){


let titulo=
tituloOferta.value.trim();


let antes=
precioAntes.value.trim();


let actual=
precioActual.value.trim();


let link=
linkOferta.value.trim();


let estado=
estadoOferta.value;



if(!titulo || !actual || !link){

alert("Completa los datos");

return;

}



let imagen="";



if(imagenOferta.files[0]){

imagen=
await convertirImagen(
imagenOferta.files[0]
);

}




await addDoc(

collection(db,"ofertas"),

{

titulo,

precioAntes:antes,

precioActual:actual,

link,

imagen,

estado,

fecha:serverTimestamp()

}

);



tituloOferta.value="";
precioAntes.value="";
precioActual.value="";
linkOferta.value="";
imagenOferta.value="";


alert("✅ Oferta publicada");


};







// MOSTRAR OFERTAS


onSnapshot(

collection(db,"ofertas"),

(snap)=>{


let html="";



snap.forEach(d=>{


let o=d.data();



html+=`

<div class="card">


${o.imagen ?

`<img src="${o.imagen}" style="
width:100%;
border-radius:12px;
">`

:""}



<h3>
${o.titulo}
</h3>


<p>
Antes:
<s>$${o.precioAntes}</s>
</p>


<h2 style="
color:#00a650;
">

$${o.precioActual}

</h2>



<p>

${o.estado==="activo"

?
"🟢 ACTIVA"

:

"🔴 AGOTADA"

}

</p>



<button class="btn"
onclick="cambiarEstadoOferta('${d.id}','${o.estado}')">

🔄 Estado

</button>


<br><br>


<button 
style="
background:#e53935;
color:white;
width:100%;
"

onclick="eliminarOferta('${d.id}')">

🗑 Eliminar

</button>



</div>


`;



});



document.getElementById("listaOfertas").innerHTML=

html || "Sin ofertas";


});







// CAMBIAR ESTADO


window.cambiarEstadoOferta=
async function(id,estado){


let nuevo=
estado==="activo"
?
"agotado"
:
"activo";



await updateDoc(

doc(db,"ofertas",id),

{

estado:nuevo

}

);


};







// ELIMINAR


window.eliminarOferta=
async function(id){


if(confirm("¿Eliminar oferta?")){


await deleteDoc(

doc(db,"ofertas",id)

);


}


};

// ==============================
// CUPONES PRO
// ==============================


document.getElementById("zonaCupones").innerHTML=`

<div class="card">

<h3>
➕ Crear Cupón
</h3>


<input id="codigoCupon"
placeholder="Código cupón">


<input id="descuentoCupon"
placeholder="Ejemplo: $500 OFF">


<input id="minimoCupon"
placeholder="Compra mínima">


<input id="ahorroCupon"
placeholder="Ahorro generado">


<select id="tipoCupon">

<option value="relampago">
⚡ Relámpago
</option>

<option value="bancario">
🏦 Bancario
</option>

<option value="exclusivo">
💎 Meli+
</option>

</select>


<select id="estadoCupon">

<option value="activo">
🟢 Activo
</option>

<option value="agotando">
🟠 Por agotarse
</option>

<option value="agotado">
🔴 Agotado
</option>


</select>



<button class="btn"
onclick="guardarCupon()">

🎟 GUARDAR CUPÓN

</button>


</div>


<br>


<div id="listaCupones"></div>

`;







// GUARDAR CUPÓN


window.guardarCupon=
async function(){



let codigo=
codigoCupon.value
.trim()
.toUpperCase();



let descuento=
descuentoCupon.value.trim();


let minimo=
minimoCupon.value.trim();


let ahorro=
Number(
ahorroCupon.value.replace(/\D/g,"")
)||0;



let tipo=
tipoCupon.value;


let estado=
estadoCupon.value;



if(!codigo){

alert("Escribe código");

return;

}



await setDoc(

doc(db,"cupones",codigo),

{


descuento,

minimo,

ahorro,

tipo,

estado,

copias:0,

fecha:serverTimestamp()


}


);



codigoCupon.value="";
descuentoCupon.value="";
minimoCupon.value="";
ahorroCupon.value="";


alert("✅ Cupón creado");


};







// MOSTRAR CUPONES


onSnapshot(

collection(db,"cupones"),

(snapshot)=>{


let html="";


snapshot.forEach(d=>{


let c=d.data();



let estado="";


if(c.estado==="activo"){

estado="🟢 ACTIVO";

}

else if(c.estado==="agotando"){

estado="🟠 POR AGOTARSE";

}

else{

estado="🔴 AGOTADO";

}





html+=`

<div class="card">


<h3>

${c.tipo==="relampago"
?"⚡ RELÁMPAGO"
:
c.tipo==="bancario"
?"🏦 BANCARIO"
:
"💎 MELI+"}

</h3>



<h2>

${d.id}

</h2>



<p>

${c.descuento}

</p>



<p>

Compra mínima:
<b>
${c.minimo}
</b>

</p>



<p>

Copias:
<b>
${c.copias || 0}
</b>

</p>



<p>

${estado}

</p>



<button class="btn"

onclick="cambiarEstadoCupon('${d.id}','${c.estado}')">

🔄 Cambiar estado

</button>



<br><br>



<button

style="
background:#e53935;
color:white;
width:100%;
"

onclick="eliminarCupon('${d.id}')">

🗑 Eliminar

</button>


</div>


`;


});



document.getElementById("listaCupones").innerHTML=

html || "Sin cupones";


});









// CAMBIAR ESTADO


window.cambiarEstadoCupon=
async function(id,estado){


let nuevo;


if(estado==="activo"){

nuevo="agotando";

}

else if(estado==="agotando"){

nuevo="agotado";

}

else{

nuevo="activo";

}



await updateDoc(

doc(db,"cupones",id),

{

estado:nuevo

}

);


};







// ELIMINAR


window.eliminarCupon=
async function(id){


if(confirm("¿Eliminar cupón?")){


await deleteDoc(

doc(db,"cupones",id)

);


}


};

// ==============================
// BIBLIOTECA DE IMÁGENES
// ==============================


document.getElementById("estadisticas").innerHTML+=`

<div class="card">

<h3>
🖼 Biblioteca imágenes
</h3>


<input 
type="file"
id="archivoImagen"
accept="image/*">


<button class="btn"
onclick="subirImagen()">

📤 SUBIR IMAGEN

</button>


<div id="galeria"></div>


</div>


<br>


<div class="card">

<h3>
💰 Actualizar ahorro comunidad
</h3>


<input
id="nuevoAhorro"
placeholder="Ejemplo: 25000">


<button class="btn"
onclick="guardarAhorro()">

💰 GUARDAR AHORRO

</button>


</div>

`;





// CONVERTIR IMAGEN


function convertirImagen(file){

return new Promise(resolve=>{


let reader=new FileReader();


reader.onload=()=>{

resolve(reader.result);

};


reader.readAsDataURL(file);


});

}





// SUBIR IMAGEN


window.subirImagen=
async function(){


let archivo=
document.getElementById("archivoImagen")
.files[0];



if(!archivo){

alert("Selecciona una imagen");

return;

}



let imagen=
await convertirImagen(archivo);



await addDoc(

collection(db,"imagenes"),

{

nombre:archivo.name,

imagen,

fecha:serverTimestamp()

}

);



document.getElementById("archivoImagen").value="";


alert("✅ Imagen guardada");


};








// MOSTRAR GALERÍA


onSnapshot(

collection(db,"imagenes"),

(snapshot)=>{


let html="";



snapshot.forEach(d=>{


let i=d.data();


html+=`

<div class="card">


<img src="${i.imagen}" style="
width:100%;
border-radius:12px;
">


<p>

${i.nombre}

</p>


<button

style="
background:#e53935;
color:white;
width:100%;
"

onclick="borrarImagen('${d.id}')">

🗑 ELIMINAR

</button>



</div>


`;



});


document.getElementById("galeria").innerHTML=

html || "Sin imágenes";


});








// ELIMINAR IMAGEN


window.borrarImagen=
async function(id){


if(confirm("¿Eliminar imagen?")){


await deleteDoc(

doc(db,"imagenes",id)

);


}


};








// ==============================
// AHORRO COMUNIDAD
// ==============================


window.guardarAhorro=
async function(){


let cantidad=
Number(
document.getElementById("nuevoAhorro")
.value
.replace(/\D/g,"")
);



await setDoc(

doc(db,"estadisticas","ahorro"),

{

total:cantidad,

fecha:serverTimestamp()

}

);



alert("✅ Ahorro actualizado");


};








// ==============================
// CONFIGURACIÓN GENERAL
// ==============================


document.getElementById("estadisticas").innerHTML+=`

<div class="card">

<h3>
⚙ Estado general
</h3>


<select id="estadoGeneral">

<option value="activo">
🟢 Todo activo
</option>


<option value="agotando">
🟠 Últimos disponibles
</option>


<option value="agotado">
🔴 Todo agotado
</option>


</select>



<button class="btn"
onclick="guardarEstadoGeneral()">

💾 GUARDAR

</button>


</div>

`;





window.guardarEstadoGeneral=
async function(){


await setDoc(

doc(db,"configuracion","estado"),

{

estado:
document.getElementById("estadoGeneral")
.value,

fecha:serverTimestamp()

}

);



alert("✅ Configuración guardada");


};

// ==============================
// ESTADÍSTICAS PRO
// ==============================


document.getElementById("zonaStats").innerHTML=`

<div class="card">

<h3>
🏆 Ranking Cupones
</h3>


<div id="ranking"></div>


</div>


<br>


<div class="card">

<h3>
📊 Actividad diaria
</h3>


<canvas id="grafica"></canvas>


</div>


`;





// ==============================
// RANKING CUPONES
// ==============================


onSnapshot(

collection(db,"cupones"),

(snapshot)=>{


let lista=[];


snapshot.forEach(d=>{


let c=d.data();


lista.push({

codigo:d.id,

copias:c.copias||0,

tipo:c.tipo

});


});



lista.sort(
(a,b)=>b.copias-a.copias
);



let html="";



lista.slice(0,10)
.forEach((c,i)=>{


let lugar="🏅";


if(i===0)
lugar="🥇";


if(i===1)
lugar="🥈";


if(i===2)
lugar="🥉";



html+=`

<div class="card">

<h3>

${lugar}
${c.codigo}

</h3>


<p>

🎟 Copias:
<b>
${c.copias}
</b>

</p>


<p>

${c.tipo}

</p>


</div>


`;


});



document.getElementById("ranking").innerHTML=

html || "Sin datos";


});









// ==============================
// GRAFICA 7 DÍAS
// ==============================


let grafica;



onSnapshot(

collection(db,"visitas"),

(snapshot)=>{


let datos=[];



snapshot.forEach(d=>{


let v=d.data();


datos.push({

fecha:d.id,

visitas:v.visitas||0,

clics:v.clics||0


});


});




datos.sort(
(a,b)=>a.fecha.localeCompare(b.fecha)
);



datos=datos.slice(-7);



let labels=
datos.map(x=>x.fecha);



let visitas=
datos.map(x=>x.visitas);



let clics=
datos.map(x=>x.clics);



if(grafica){

grafica.destroy();

}




const ctx=
document.getElementById("grafica");



if(ctx){



grafica=new Chart(
ctx,
{

type:"bar",

data:{

labels,

datasets:[

{

label:"Visitas",

data:visitas

},


{

label:"Clics",

data:clics

}

]


},


options:{

responsive:true

}


}

);


}



});









// ==============================
// ACTIVIDAD EN TIEMPO REAL
// ==============================


const actividadRef=
doc(db,"contadores","global");


onSnapshot(

actividadRef,

(snap)=>{


let d=snap.data()||{};


console.log(
"Actividad:",
d
);


}

);





console.log(
"⚡ ADMIN PRO COMPLETO ACTIVADO"
);

</script>


</body>
</html>
