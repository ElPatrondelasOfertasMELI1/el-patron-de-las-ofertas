<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin PRO | El Patrón de las Ofertas</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">


<style>

*{
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
margin:0;
background:#f1f3f6;
color:#111;
}


header{

background:#ffe600;
height:55px;
display:flex;
align-items:center;
justify-content:center;
font-weight:900;
font-size:18px;

}



.login{

max-width:330px;
margin:80px auto;
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 8px 20px #ddd;

}


input{

width:100%;
padding:12px;
margin:6px 0;
border:0;
background:#f5f5f5;
border-radius:12px;

}



button{

width:100%;
padding:12px;
border:0;
border-radius:12px;
font-weight:900;
cursor:pointer;

}


.green{

background:#00c853;
color:white;

}


/* PANEL */

#panel{

display:none;

}



.menu{

position:fixed;
top:55px;
left:0;
width:170px;
bottom:0;
background:white;
padding:10px;

}


.menu button{

margin-bottom:8px;
background:#f5f5f5;
text-align:left;

}


main{

margin-left:185px;
padding:12px;

}



.box{

background:white;
padding:15px;
border-radius:18px;
margin-bottom:12px;
box-shadow:0 5px 15px #ddd;

}



.grid{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;

}



.number{

font-size:30px;
font-weight:900;
color:#00a650;

}


@media(max-width:600px){

.menu{

width:70px;

}


.menu button{

font-size:10px;

}


main{

margin-left:80px;

}

}


</style>


</head>


<body>


<header>

⚡ ADMIN PRO ⚡

</header>



<div class="login" id="login">


<h2>
🔐 Entrar
</h2>


<input 
id="pass"
type="password"
placeholder="Contraseña">


<button class="green" onclick="entrar()">

ENTRAR

</button>


</div>



<div id="panel">


<div class="menu">


<button onclick="seccion('inicio')">

📊 Inicio

</button>


<button onclick="seccion('ofertas')">

⚡ Ofertas

</button>


<button onclick="seccion('cupones')">

🎟 Cupones

</button>


</div>




<main>



<div id="inicio" class="box">


<h2>
📊 Dashboard
</h2>


<div class="grid">


<div class="box">

👥 Visitas

<div class="number" id="visitas">
0
</div>

</div>


<div class="box">

🎟 Copias

<div class="number" id="copias">
0
</div>

</div>


</div>


</div>



<div id="ofertas" class="box" style="display:none">

<h2>
⚡ Ofertas
</h2>

<div id="panelOfertas">

Aquí irá el creador de ofertas

</div>

</div>




<div id="cupones" class="box" style="display:none">

<h2>
🎟 Cupones
</h2>

Próxima sección

</div>



</main>


</div>





<script type="module">


import {initializeApp}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {

getFirestore,
doc,
collection,
addDoc,
setDoc,
onSnapshot,
deleteDoc,
serverTimestamp

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={


apiKey:"AIzaSyBo_wk-k8TrcSl0CMQz0hoUCvAKre94hW0",

authDomain:"patronofertasweb.firebaseapp.com",

projectId:"patronofertasweb",

storageBucket:"patronofertasweb.firebasestorage.app",

messagingSenderId:"292338334268",

appId:"1:292338334268:web:9dbbafe00dd23ebb72e139"


};



const app=initializeApp(firebaseConfig);

const db=getFirestore(app);



window.entrar=function(){


let p=document.getElementById("pass").value;


if(p==="Admin2026"){


login.style.display="none";

panel.style.display="block";


cargarDatos();


}

else{

alert("Contraseña incorrecta");

}


}



window.seccion=function(id){


document.querySelectorAll("main > div")
.forEach(x=>x.style.display="none");


document.getElementById(id).style.display="block";


}





function cargarDatos(){


onSnapshot(

doc(db,"contadores","global"),

(s)=>{


let d=s.data()||{};


document.getElementById("copias").innerHTML=
d.total||0;


}

);



let fecha=new Intl.DateTimeFormat(
"en-CA",
{
timeZone:"America/Mexico_City"
})
.format(new Date());



onSnapshot(

doc(db,"visitas",fecha),

(s)=>{


let d=s.data()||{};


document.getElementById("visitas").innerHTML=
d.visitas||0;


}

);



}

// ==============================
// ⚡ CREAR OFERTAS PARA CARRUSEL
// ==============================



// PANEL OFERTAS

document.getElementById("panelOfertas").innerHTML=`

<div class="box">

<h3>
➕ Nueva Oferta Relámpago
</h3>


<input id="producto"
placeholder="Nombre del producto">


<input id="antes"
placeholder="Precio anterior">


<input id="precio"
placeholder="Precio actual">


<input id="link"
placeholder="Link Mercado Libre">


<input 
id="imagen"
placeholder="URL imagen producto">


<button class="green"
onclick="crearOferta()">

⚡ PUBLICAR AL CARRUSEL

</button>


</div>


<div id="listaAdminOfertas"></div>

`;





// GUARDAR OFERTA


window.crearOferta=async function(){


let titulo=
document.getElementById("producto").value;


let precioAntes=
document.getElementById("antes").value;


let precioActual=
document.getElementById("precio").value;


let link=
document.getElementById("link").value;


let imagen=
document.getElementById("imagen").value;



if(!titulo || !precioActual || !link){

alert("Completa los datos");

return;

}



await addDoc(

collection(db,"ofertas"),

{


titulo,

precioAntes,

precioActual,

link,

imagen,


estado:"activo",

fecha:serverTimestamp()


}

);



document.getElementById("producto").value="";
document.getElementById("antes").value="";
document.getElementById("precio").value="";
document.getElementById("link").value="";
document.getElementById("imagen").value="";


alert("✅ Oferta enviada al carrusel");


};







// MOSTRAR OFERTAS EN ADMIN


onSnapshot(

collection(db,"ofertas"),

(snapshot)=>{


let html="";



snapshot.forEach((d)=>{


let o=d.data();



html+=`

<div class="box">


<img src="${o.imagen}" 
style="
width:100%;
border-radius:12px;
">


<h3>
${o.titulo}
</h3>


<p>
Antes:
<s>$${o.precioAntes}</s>
</p>


<h2>
$${o.precioActual}
</h2>


<a href="${o.link}" target="_blank">

Ver producto

</a>


<br><br>


<button 
style="
background:#e53935;
color:white;
"

onclick="borrarOferta('${d.id}')">

🗑 ELIMINAR

</button>


</div>

`;



});



document.getElementById("listaAdminOfertas").innerHTML=
html || "Sin ofertas publicadas";


});







// ELIMINAR


window.borrarOferta=
async function(id){


if(confirm("¿Eliminar oferta del carrusel?")){


await deleteDoc(
doc(db,"ofertas",id)
);


}


};

// ==============================
// 🎟 ADMIN CUPONES PRO
// ==============================


document.getElementById("cupones").innerHTML=`

<h2>
🎟 Crear Cupón
</h2>


<div class="box">


<input id="codigo"
placeholder="Código cupón">


<input id="descuento"
placeholder="Ejemplo: $500 OFF">


<input id="minimo"
placeholder="Compra mínima">


<input id="ahorro"
placeholder="Ahorro generado">


<select id="tipo">


<option value="relampago">
⚡ Relámpago
</option>


<option value="bancario">
🏦 Bancario
</option>


<option value="exclusivo">
💎 Meli+
</option>


</select>



<select id="estado">


<option value="activo">
🟢 Activo
</option>


<option value="agotando">
🟠 Por agotarse
</option>


<option value="agotado">
🔴 Agotado
</option>


</select>



<button class="green"
onclick="guardarCupon()">

🎟 PUBLICAR CUPÓN

</button>


</div>



<div id="listaAdminCupones"></div>


`;







// CREAR CUPÓN


window.guardarCupon=async function(){


let id=
document.getElementById("codigo")
.value
.trim()
.toUpperCase();



let datos={


descuento:
document.getElementById("descuento").value,


minimo:
document.getElementById("minimo").value,


ahorro:
Number(
document.getElementById("ahorro").value
.replace(/\D/g,"")
)||0,


tipo:
document.getElementById("tipo").value,


estado:
document.getElementById("estado").value,


copias:0,


fecha:serverTimestamp()


};





if(!id){

alert("Escribe el código");

return;

}




await setDoc(

doc(db,"cupones",id),

datos

);



alert("✅ Cupón publicado");


document.getElementById("codigo").value="";
document.getElementById("descuento").value="";
document.getElementById("minimo").value="";
document.getElementById("ahorro").value="";


};








// MOSTRAR CUPONES ADMIN


onSnapshot(

collection(db,"cupones"),

(snapshot)=>{


let html="";



snapshot.forEach((d)=>{


let c=d.data();



let icono=
c.tipo==="relampago"
?
"⚡"
:
c.tipo==="bancario"
?
"🏦"
:
"💎";



html+=`

<div class="box">


<h3>
${icono} ${d.id}
</h3>



<p>
Descuento:
<b>${c.descuento}</b>
</p>


<p>
Mínimo:
<b>${c.minimo}</b>
</p>


<p>
Copias:
<b>${c.copias || 0}</b>
</p>


<p>
Estado:
${c.estado}
</p>



<button 
style="
background:#e53935;
color:white;
"

onclick="eliminarCupon('${d.id}')">

🗑 ELIMINAR

</button>


</div>


`;



});



document.getElementById("listaAdminCupones").innerHTML=

html || "Sin cupones";


});








// ELIMINAR CUPÓN


window.eliminarCupon=
async function(id){


if(confirm("¿Eliminar cupón?")){


await deleteDoc(
doc(db,"cupones",id)
);


}


};

// ==============================
// 📊 DASHBOARD ESTADÍSTICAS PRO
// ==============================


// Agregar zona de estadísticas

document.getElementById("inicio").innerHTML += `


<div class="box">

<h3>
💰 Ahorro Comunidad
</h3>


<h1 id="totalAhorro">
$0 MXN
</h1>


</div>



<div class="box">

<h3>
🏆 Cupón más usado
</h3>


<h2 id="topCupon">
Sin datos
</h2>


</div>



<div class="box">

<h3>
🎟 Ranking de cupones
</h3>


<div id="rankingCupones">

</div>


</div>


`;





// ==============================
// AHORRO TOTAL
// ==============================


onSnapshot(

doc(db,"estadisticas","ahorro"),

(snap)=>{


let d=snap.data()||{};


document.getElementById("totalAhorro")
.innerHTML=

"$"+
Number(d.total||0)
.toLocaleString("es-MX")
+
" MXN";


}

);







// ==============================
// COPIAS GLOBALES
// ==============================


onSnapshot(

doc(db,"contadores","global"),

(snap)=>{


let d=snap.data()||{};



if(document.getElementById("copias")){

document.getElementById("copias")
.innerHTML=
d.total||0;

}


}

);







// ==============================
// RANKING CUPONES
// ==============================


onSnapshot(

collection(db,"cupones"),

(snapshot)=>{


let lista=[];



snapshot.forEach((d)=>{


let c=d.data();



lista.push({

codigo:d.id,

copias:c.copias||0,

tipo:c.tipo

});


});




lista.sort(
(a,b)=>
b.copias-a.copias
);





let html="";




lista.slice(0,10)
.forEach((c,i)=>{


let lugar="🏅";


if(i===0)
lugar="🥇";


if(i===1)
lugar="🥈";


if(i===2)
lugar="🥉";



html+=`

<div class="box">


<h3>

${lugar}
${c.codigo}

</h3>


<p>

🎟 Copias:
<b>
${c.copias}
</b>

</p>


<p>

${c.tipo}

</p>


</div>


`;



});




document.getElementById("rankingCupones")
.innerHTML=

html || "Sin datos";





if(lista.length){

document.getElementById("topCupon")
.innerHTML=

lista[0].codigo+
" 🔥";


}



});







// ==============================
// VISITAS EN TIEMPO REAL
// ==============================


let fechaHoy =

new Intl.DateTimeFormat(
"en-CA",
{
timeZone:"America/Mexico_City"
})
.format(new Date());





onSnapshot(

doc(db,"visitas",fechaHoy),

(snap)=>{


let d=snap.data()||{};



if(document.getElementById("visitas")){


document.getElementById("visitas")
.innerHTML=
d.visitas||0;


}



}

);




console.log(
"📊 Estadísticas PRO conectadas"
);

// ==============================
// ⚙ ADMIN PRO FINAL
// ==============================


// BOTÓN CERRAR SESIÓN

document.querySelector(".menu").innerHTML += `

<button onclick="salir()">

🚪 Salir

</button>

`;



window.salir=function(){

location.reload();

};





// ==============================
// 🖼 BIBLIOTECA IMÁGENES
// ==============================


window.guardarImagen=async function(){


let url=
document.getElementById("imagenBiblioteca")
.value.trim();



if(!url){

alert("Agrega imagen");

return;

}



await addDoc(

collection(db,"imagenes"),

{

imagen:url,

fecha:serverTimestamp()

}

);



document.getElementById("imagenBiblioteca")
.value="";


alert("Imagen guardada");


};







onSnapshot(

collection(db,"imagenes"),

(snap)=>{


let html="";



snap.forEach(d=>{


let i=d.data();



html+=`

<div class="box">


<img src="${i.imagen}"

style="
width:100%;
border-radius:12px;
">


<button

style="
background:#e53935;
color:white;
"

onclick="borrarImagen('${d.id}')">

Eliminar

</button>


</div>

`;



});



let g=document.getElementById("galeria");


if(g){

g.innerHTML=html || "Sin imágenes";

}



});







window.borrarImagen=
async function(id){


if(confirm("¿Eliminar imagen?")){


await deleteDoc(
doc(db,"imagenes",id)
);


}


};









// ==============================
// 🌎 ESTADO GENERAL PAGINA
// ==============================


window.guardarEstadoPagina=
async function(){



await setDoc(

doc(db,"configuracion","pagina"),

{

estado:
document.getElementById("estadoPagina")
.value,


fecha:serverTimestamp()

}

);



alert("Estado actualizado");


};









// ==============================
// 🔒 RECORDAR LOGIN
// ==============================


const sesion=
localStorage.getItem("admin");



if(sesion==="ok"){


document.getElementById("login").style.display="none";

document.getElementById("panel").style.display="block";


}





// MODIFICAR LOGIN PARA GUARDAR


const loginOriginal=window.entrar;


window.entrar=function(){


let p=
document.getElementById("pass").value;



if(p==="Admin2026"){


localStorage.setItem(
"admin",
"ok"
);


document.getElementById("login")
.style.display="none";


document.getElementById("panel")
.style.display="block";


cargarDatos();


}

else{


alert("Contraseña incorrecta");


}


};






console.log(
"⚡ ADMIN PRO FINAL ACTIVADO"
);

</script>


</body>
</html>
