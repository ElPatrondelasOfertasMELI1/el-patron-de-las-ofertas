<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<style>

*{
box-sizing:border-box;
font-family:'Inter',sans-serif;
}


body{
margin:0;
background:#f2f3f5;
color:#111;
}


/* HEADER */

header{

height:75px;
background:#ffe600;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:22px;
font-weight:900;
position:sticky;
top:0;
z-index:20;

}



/* LOGIN */


.login{

max-width:400px;
margin:60px auto;
padding:25px;

}



input,
textarea,
select{

width:100%;
padding:15px;
margin:8px 0;
border:0;
border-radius:15px;
font-size:15px;
background:white;

}



button{

border:0;
padding:15px;
border-radius:15px;
font-weight:900;
cursor:pointer;

}



.btn-main{

width:100%;
background:#00c853;
color:white;

}


.btn-delete{

background:#e53935;
color:white;

}


.btn-status{

background:#ff9800;
color:white;

}



/* PANEL */


#panel{

display:none;

}




/* MENU */


.sidebar{

position:fixed;
top:75px;
left:0;
bottom:0;
width:240px;
background:white;
padding:15px;
box-shadow:5px 0 20px #ddd;
overflow:auto;

}



.sidebar h2{

font-weight:900;

}



.menu{

width:100%;
margin-bottom:10px;
background:#f5f5f5;
text-align:left;
font-size:15px;

}



.menu:hover{

background:#ffe600;

}




/* CONTENIDO */


.content{

margin-left:260px;
padding:25px;

}



.section{

display:none;

}



.section.active{

display:block;

}




/* TARJETAS */


.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;

}



.card{

background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px #ddd;
margin-bottom:15px;

}



.number{

font-size:38px;
font-weight:900;
color:#00c853;

}



.box{

background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
box-shadow:0 5px 15px #ddd;

}



.lista{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:15px;

}



img{

width:100%;
border-radius:15px;

}




.badge{

padding:8px 12px;
border-radius:20px;
font-weight:900;
display:inline-block;

}


.activo{

background:#c8f7c5;
color:#008000;

}


.agotando{

background:#ffe0a3;
color:#b36b00;

}


.agotado{

background:#ffcdd2;
color:#c62828;

}





/* MOVIL */


@media(max-width:800px){


.sidebar{

width:75px;

}


.menu{

font-size:11px;
padding:10px 5px;

}



.content{

margin-left:90px;
padding:15px;

}


}

.bank-card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px #ddd;
}

</style>


</head>



<body>



<header>

⚡ PANEL ADMIN PRO ⚡
<br>
EL PATRÓN DE LAS OFERTAS

</header>



<!-- LOGIN -->


<div class="login" id="login">


<h2>

🔐 Acceso administrador

</h2>


<input 
id="password"
type="password"
placeholder="Contraseña">


<button class="btn-main" onclick="login()">

ENTRAR

</button>


</div>





<!-- PANEL -->


<div id="panel">



<div class="sidebar">


<h2>

⚙ ADMIN

</h2>



<button class="menu" onclick="abrirSeccion('dashboard')">

📊 Dashboard

</button>


<button class="menu" onclick="abrirSeccion('ofertas')">

⚡ Ofertas

</button>



<button class="menu" onclick="abrirSeccion('cupones')">

🎟 Cupones

</button>



<button class="menu" onclick="abrirSeccion('imagenes')">

🖼 Imágenes

</button>

</button>

</button>



</div>





<div class="content">



<div id="dashboard" class="section active">

<h1>
📊 Dashboard
</h1>


<div class="grid">


<div class="card">

<h3>👥 Visitantes</h3>

<div class="number" id="visitantes">
0
</div>

</div>



<div class="card">

<h3>👆 Clics</h3>

<div class="number" id="clics">
0
</div>

</div>



<div class="card">

<h3>⚡ Relámpago</h3>

<div class="number" id="relampago">
0
</div>

</div>



<div class="card">

<h3>💎 Meli+</h3>

<div class="number" id="meli">
0
</div>

</div>


</div>



<div class="box">

<h2>
📈 Actividad
</h2>


<div id="actividad">

Cargando...

</div>


</div>

<div id="ofertas" class="section">

<div id="zonaOfertas"></div>

<div id="cupones" class="section">

<div id="zonaCupones"></div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";


import {

getFirestore,
doc,
setDoc,
getDoc,
collection,
onSnapshot,
serverTimestamp,
increment,
addDoc,
deleteDoc,
updateDoc

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";




// ==========================
// FIREBASE
// ==========================


const firebaseConfig = {

apiKey:"AIzaSyBo_wk-k8TrcSl0CMQz0hoUCvAKre94hW0",

authDomain:"patronofertasweb.firebaseapp.com",

projectId:"patronofertasweb",

storageBucket:"patronofertasweb.firebasestorage.app",

messagingSenderId:"292338334268",

appId:"1:292338334268:web:9dbbafe00dd23ebb72e139"

};



const app = initializeApp(firebaseConfig);


const db = getFirestore(app);





// ==========================
// LOGIN
// ==========================


window.login=function(){


let pass=document.getElementById("password").value;



if(pass==="Admin2026"){


document.getElementById("login").style.display="none";


document.getElementById("panel").style.display="block";


cargarDashboard();



}

else{


alert("❌ Contraseña incorrecta");


}



};







// ==========================
// CAMBIO DE SECCIONES
// ==========================


window.abrirSeccion=function(id){



document.querySelectorAll(".section")
.forEach(e=>{


e.classList.remove("active");


});



document.getElementById(id)
.classList.add("active");



};








// ==========================
// DASHBOARD
// ==========================


function cargarDashboard(){



const globalRef =
doc(db,"contadores","global");



onSnapshot(globalRef,(snap)=>{


let d=snap.data() || {};



document.getElementById("clics").innerHTML =
d.total || 0;



document.getElementById("relampago").innerHTML =
d.relampago || 0;



document.getElementById("meli").innerHTML =
d.exclusivos || 0;



});







const visitasRef =
doc(db,"visitas","contador");



onSnapshot(visitasRef,(snap)=>{


let d=snap.data() || {};



document.getElementById("visitantes").innerHTML =
d.total || 0;



});








const historial =
collection(db,"visitas_historial");



onSnapshot(historial,(snap)=>{


let html="";



snap.forEach(d=>{


html+=`


<div class="card">


📅 ${d.id}


<br>


👥 Visitas:


<b>

${d.data().total || 0}

</b>


</div>


`;



});



document.getElementById("actividad").innerHTML =

html || "Sin datos";



});



}


// ==========================
// CREAR BASE AUTOMÁTICA
// ==========================


async function iniciarBase(){



const documentos=[


["contadores","global"],


["visitas","contador"],


["estadisticas","ahorro"],


["configuracion","general"]


];


for(let item of documentos){


let referencia =
doc(db,item[0],item[1]);


let existe =
await getDoc(referencia);


if(!existe.exists()){


await setDoc(referencia,{

fecha:serverTimestamp(),

total:0,

relampago:0,

exclusivos:0


});


}


}

}

iniciarBase();


console.log("⚡ ADMIN PRO FIREBASE CARGADO");

// ==========================
// OFERTAS RELÁMPAGO PRO
// ==========================


document.getElementById("zonaOfertas").innerHTML = `


<div class="box">


<h2>
➕ Nueva Oferta
</h2>



<input id="tituloOferta"
placeholder="Nombre del producto">



<input id="precioAntes"
placeholder="Precio anterior">



<input id="precioActual"
placeholder="Precio actual">



<input id="linkOferta"
placeholder="Link Mercado Libre">



<select id="estadoOferta">


<option value="activo">

🟢 Activa

</option>


<option value="agotado">

🔴 Agotada

</option>


</select>




<input 
type="file"
id="imagenOferta"
accept="image/*">





<button class="btn-main"
onclick="guardarOferta()">

⚡ PUBLICAR OFERTA

</button>


</div>





<div class="box">


<h2>

⚡ Ofertas Publicadas

</h2>


<div id="listaOfertas" class="lista">

</div>


</div>



`;







// CONVERTIR IMAGEN


function convertirImagen(file){


return new Promise(resolve=>{


let reader=new FileReader();



reader.onload=()=>{


resolve(reader.result);


};



reader.readAsDataURL(file);



});


}








// GUARDAR OFERTA


window.guardarOferta = async function(){



let titulo =
tituloOferta.value.trim();



let antes =
precioAntes.value.trim();



let actual =
precioActual.value.trim();



let link =
linkOferta.value.trim();



let estado =
estadoOferta.value;





if(!titulo || !actual || !link){


alert("Completa los datos");


return;


}





let imagen="";



if(imagenOferta.files[0]){


imagen =
await convertirImagen(
imagenOferta.files[0]
);


}






await addDoc(

collection(db,"ofertas"),

{


titulo,

precioAntes:antes,

precioActual:actual,

link,

imagen,

estado,

fecha:serverTimestamp()


}

);







// LIMPIAR TODO


tituloOferta.value="";

precioAntes.value="";

precioActual.value="";

linkOferta.value="";

imagenOferta.value="";

estadoOferta.value="activo";


alert("✅ Oferta publicada");


};


// MOSTRAR OFERTAS


onSnapshot(

collection(db,"ofertas"),

(snap)=>{


let html="";



snap.forEach(d=>{


let o=d.data();



html+=`


<div class="card">



${o.imagen ?

`

<img src="${o.imagen}">

`

:

""

}


<h3>

${o.titulo}

</h3>





❌ <s>

$${o.precioAntes}

</s>



<br>


🔥 <b>

$${o.precioActual}

</b>




<br><br>





${o.estado==="activo"

?

`<span class="badge activo">

🟢 Activa

</span>`

:

`<span class="badge agotado">

🔴 Agotada

</span>`

}





<br><br>




<button class="btn-status"

onclick="cambiarEstadoOferta('${d.id}','${o.estado}')">

🔄 CAMBIAR ESTADO

</button>




<br><br>




<button class="btn-delete"

onclick="borrarOferta('${d.id}')">

🗑 ELIMINAR

</button>




</div>



`;



});


document.getElementById("listaOfertas").innerHTML =

html || "Sin ofertas";



});


// CAMBIAR ESTADO


window.cambiarEstadoOferta = async function(id,estado){



let nuevo;



if(estado==="activo"){


nuevo="agotado";


}

else{


nuevo="activo";


}






await updateDoc(

doc(db,"ofertas",id),

{


estado:nuevo


}

);



};


// ELIMINAR OFERTA


window.borrarOferta = async function(id){

if(confirm("¿Eliminar oferta?")){


await deleteDoc(

doc(db,"ofertas",id)

);


}



};

// ==========================
// CUPONES ADMIN PRO
// ==========================


document.getElementById("zonaCupones").innerHTML = `


<div class="box">


<h2>
➕ Crear Cupón
</h2>



<input id="codigoCupon"
placeholder="Código del cupón">



<input id="descuentoCupon"
placeholder="Ejemplo: 10% OFF o $500 OFF">

<input id="minimoCupon"
placeholder="Ejemplo: $4,000">





<select id="tipoCupon">


<option value="relampago">

⚡ Relámpago

</option>



<option value="bancario">

🏦 Bancario

</option>



<option value="exclusivo">

💎 Meli+

</option>


</select>


<select id="estadoCupon">


<option value="activo">

🟢 Activo

</option>



<option value="agotando">

🟠 Por agotarse

</option>



<option value="agotado">

🔴 Agotado

</option>



</select>


<button class="btn-main"

onclick="guardarCupon()">

🎟 GUARDAR CUPÓN

</button>



</div>


<div class="box">


<h2>

🎟 Cupones creados

</h2>



<div id="listaCupones" class="lista">

</div>



</div>



`;









// GUARDAR CUPÓN


window.guardarCupon = async function(){



let codigo =
codigoCupon.value
.trim()
.toUpperCase();



let descuento =
descuentoCupon.value.trim();


let minimo =
minimoCupon.value
.trim()
.replace(/\B(?=(\d{3})+(?!\d))/g,",");



let tipo =
tipoCupon.value;



let estado =
estadoCupon.value;


if(!codigo){


alert("Escribe el código");


return;


}






await setDoc(

doc(db,"cupones",codigo),

{


descuento,

minimo:"$"+minimo,

tipo,

estado,

copias:0,

fecha:serverTimestamp()


}

);







// LIMPIAR CAMPOS


codigoCupon.value="";

descuentoCupon.value="";

minimoCupon.value="";

tipoCupon.value="relampago";

estadoCupon.value="activo";





alert("✅ Cupón guardado");



};


// MOSTRAR CUPONES



onSnapshot(collection(db,"cupones"), (snap)=>{

let html="";

snap.forEach(d=>{

const c=d.data();

let estadoTexto="";

if(c.estado==="activo"){
estadoTexto='<span class="badge activo">🟢 Activo</span>';
}

else if(c.estado==="agotando"){
estadoTexto='<span class="badge agotando">🟠 Por agotarse</span>';
}

else{
estadoTexto='<span class="badge agotado">🔴 Agotado</span>';
}

html+=`

<div class="card">

<h3>
${c.tipo=="relampago"?"⚡ CUPÓN RELÁMPAGO":
c.tipo=="bancario"?"🏦 CUPÓN BANCARIO":
"💎 CUPÓN MELI+"}
</h3>

${estadoTexto}

<p><b>Código:</b> ${d.id}</p>

<p style="
font-size:28px;
font-weight:900;
color:#00a650;
text-align:center;
">
${c.descuento}
</p>

<p><b>Compra mínima:</b> ${c.minimo}</p>

<p><b>Copias:</b> ${c.copias || 0}</p>

<button class="btn-status"
onclick="cambiarEstadoCupon('${d.id}','${c.estado}')">
🔄 Cambiar estado
</button>

<br><br>

<button class="btn-delete"
onclick="eliminarCupon('${d.id}')">
🗑 Eliminar
</button>

</div>

`;

});

document.getElementById("listaCupones").innerHTML=html || "Sin cupones";

});



// CAMBIAR ESTADO CUPÓN


window.cambiarEstadoCupon = async function(id,estado){



let nuevo;



if(estado==="activo"){


nuevo="agotando";


}

else if(estado==="agotando"){


nuevo="agotado";


}

else{


nuevo="activo";


}






await updateDoc(

doc(db,"cupones",id),

{


estado:nuevo


}

);



};


// ELIMINAR CUPÓN


window.eliminarCupon = async function(id){



if(confirm("¿Eliminar cupón?")){


await deleteDoc(

doc(db,"cupones",id)

);


}



};

// CONTADOR DE COPIAS


window.registrarCopia = async function(codigo){



await updateDoc(

doc(db,"cupones",codigo),

{


copias:increment(1)


}

);



};

// ==========================
// BIBLIOTECA DE IMÁGENES
// ==========================


document.getElementById("zonaImagenes").innerHTML = `


<div class="box">


<h2>

📤 Subir imagen

</h2>



<input 
type="file"
id="archivoImagen"
accept="image/*">



<button class="btn-main"

onclick="subirImagen()">

🖼 GUARDAR IMAGEN

</button>


</div>





<div class="box">


<h2>

🖼 Galería

</h2>



<div id="galeria" class="lista">

</div>



</div>



`;


function convertirImagenGaleria(file){


return new Promise(resolve=>{


let reader=new FileReader();



reader.onload=()=>{


resolve(reader.result);


};



reader.readAsDataURL(file);



});


}


window.subirImagen = async function(){


let archivo =
document.getElementById("archivoImagen").files[0];



if(!archivo){


alert("Selecciona una imagen");


return;


}


let imagen =
await convertirImagenGaleria(archivo);


await addDoc(

collection(db,"imagenes"),

{


nombre:archivo.name,

imagen,

fecha:serverTimestamp()


}

);


document.getElementById("archivoImagen").value="";



alert("✅ Imagen guardada");


};


onSnapshot(

collection(db,"imagenes"),

(snap)=>{


let html="";



snap.forEach(d=>{


let i=d.data();



html+=`


<div class="card">


<img src="${i.imagen}">


<br>


<b>

${i.nombre}

</b>



<br><br>



<button class="btn-delete"

onclick="borrarImagen('${d.id}')">

🗑 ELIMINAR

</button>



</div>



`;



});


document.getElementById("galeria").innerHTML=

html || "Sin imágenes";



});









window.borrarImagen = async function(id){



if(confirm("¿Eliminar imagen?")){


await deleteDoc(

doc(db,"imagenes",id)

);


}


};


// ==========================
// ESTADÍSTICAS
// ==========================


document.getElementById("zonaEstadisticas").innerHTML=`


<div class="box">


<h2>

📈 Copias de cupones

</h2>



<div id="listaStats">

Cargando...

</div>



</div>



`;







onSnapshot(

collection(db,"cupones"),

(snap)=>{


let html="";



snap.forEach(d=>{


let c=d.data();



html+=`


<div class="card">


🎟

<b>

${d.id}

</b>



<br><br>



Copias:

<h2>

${c.copias || 0}

</h2>



</div>



`;



});





document.getElementById("listaStats").innerHTML=

html || "Sin datos";



});









// ==========================
// CONFIGURACIÓN
// ==========================



document.getElementById("zonaConfiguracion").innerHTML=`


<div class="box">


<h2>

⚙ Estado general

</h2>





<select id="estadoGeneral">


<option value="activo">

🟢 Todos activos

</option>



<option value="agotando">

🟠 Últimos disponibles

</option>



<option value="agotado">

🔴 Todos agotados

</option>



</select>




<br><br>



<button class="btn-main"

onclick="guardarConfiguracion()">

💾 GUARDAR CONFIGURACIÓN

</button>




</div>



`;







window.guardarConfiguracion = async function(){



await setDoc(

doc(db,"configuracion","estado"),

{


estado:
document.getElementById("estadoGeneral").value,


fecha:serverTimestamp()


}

);



alert("✅ Configuración guardada");


};







console.log(
"⚡ ADMIN PRO COMPLETO CARGADO"
);



</script>


</body>

</html>
